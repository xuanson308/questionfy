<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title></title>

<style>
body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
    font-family: Arial;
    background: #ffe6f0;
    margin: 0;
}

.container {
    width: 90%;
}

h1 {
    font-size: 24px;
    margin-bottom: 25px;
}

button {
    padding: 12px 25px;
    font-size: 16px;
    margin: 10px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

#yes {
    background: #ff4d6d;
    color: white;
}

#no {
    background: #ccc;
    position: absolute;
}

input {
    padding: 12px;
    font-size: 16px;
    border-radius: 8px;
    border: 1px solid #ccc;
    width: 90%;
    max-width: 300px;
}

/* link messenger */
#messLink {
    display: none;
    margin-top: 20px;
    font-size: 18px;
    color: #ff4d6d;
    text-decoration: none;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<h1 id="text">Hôm nay đi làm của e ntn?</h1>

<input id="inputBox" placeholder="Viết vào đây..." />
<br><br>

<button id="yes">Tiếp ➡️</button>
<button id="no" style="display:none;">Không</button>

<br>
<a id="messLink" href="https://m.me/" target="_blank">
👉 Mở Messenger để nhắn luôn 💬
</a>

</div>

<script>
let step = 1;
let scaleYes = 1;
let scaleNo = 1;

let text = document.getElementById("text");
let yesBtn = document.getElementById("yes");
let noBtn = document.getElementById("no");
let inputBox = document.getElementById("inputBox");
let messLink = document.getElementById("messLink");

// scale
function updateSize() {
    yesBtn.style.transform = "scale(" + scaleYes + ")";
    noBtn.style.transform = "scale(" + scaleNo + ")";
}

// nhỏ nút từ chối
function shrinkNo() {
    if (scaleNo > 0.3) {
        scaleNo -= 0.1;
        scaleYes += 0.1;
        updateSize();
    }
}

// chạy trốn
function moveNo() {
    let x = Math.random() * (window.innerWidth - 100);
    let y = Math.random() * (window.innerHeight - 50);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

// YES
yesBtn.onclick = () => {
    step++;

    scaleYes = 1;
    scaleNo = 1;
    updateSize();

    noBtn.onmouseover = null;

    if (step === 2) {
        text.innerText = "E không thích nói chuyện với tôi à?";
        inputBox.style.display = "none";

        yesBtn.innerText = "Có";
        noBtn.innerText = "Không";
        noBtn.style.display = "inline-block";
    }

    else if (step === 3) {
        text.innerText = "Vậy sao e bơ tôi v";
        yesBtn.innerText = "Lỗi e";
        noBtn.innerText = "Phải chịu";
    }

    else if (step === 4) {
        text.innerText = "Ok! Vậy giờ mở mess lên và nhắn luôn thôi";
        yesBtn.innerText = "Oki";
        noBtn.innerText = "Còn lâu";

        noBtn.onmouseover = moveNo;
    }

    else if (step === 5) {
        text.innerText = "Nhắn luôn nhé 😘";

        yesBtn.style.display = "none";
        noBtn.style.display = "none";

        messLink.style.display = "inline-block"; // hiện link
    }
};

// NO
noBtn.onclick = () => {
    if (step === 2 || step === 3 || step === 4) {
        shrinkNo();
    }
};

// hover (chỉ câu 4)
noBtn.onmouseover = () => {
    if (step === 4) {
        moveNo();
        shrinkNo();
    }
};
</script>

</body>
</html>
